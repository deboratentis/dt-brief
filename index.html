<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DT Daily Brief</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --cream: #F5F0E8;
    --olive: #6B7C5A;
    --olive-dark: #4A5A3A;
    --brown: #8B6F5E;
    --mustard: #C8A84B;
    --warm-white: #FAF7F2;
    --text-dark: #2C2416;
    --text-mid: #5C4F3A;
    --text-light: #9A8A76;
    --urgent: #C0392B;
    --warning: #D4890A;
    --ok: #5A7C5A;
    --pink: #B85C7A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--text-dark);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  .grain-overlay {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    background: var(--olive-dark);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--cream);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .brand span { color: var(--mustard); font-weight: 600; }

  .live-clock {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--cream);
    opacity: 0.7;
    letter-spacing: 0.06em;
  }

  .main {
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* ── Date Hero ── */
  .date-hero {
    text-align: center;
    margin-bottom: 28px;
    padding: 28px 20px 22px;
    background: var(--olive-dark);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    animation: fadeSlideDown 0.5s ease both;
  }

  .date-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--mustard), var(--brown), var(--mustard));
  }

  .date-line {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    color: var(--mustard);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .date-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--cream);
    line-height: 1.1;
  }

  .day-badge {
    display: inline-block;
    margin-top: 12px;
    background: var(--mustard);
    color: var(--text-dark);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    padding: 5px 16px;
    text-transform: uppercase;
  }

  /* ── Challenge Card ── */
  .challenge-card {
    background: var(--warm-white);
    border-radius: 2px;
    padding: 22px 24px;
    margin-bottom: 10px;
    border-left: 4px solid var(--pink);
    animation: fadeSlideUp 0.4s ease both;
  }

  .challenge-pillar {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 6px;
  }

  .challenge-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 400;
    color: var(--text-dark);
    margin-bottom: 10px;
    line-height: 1.25;
  }

  .challenge-body {
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--text-mid);
  }

  .challenge-reflection {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(107,124,90,0.2);
    font-size: 0.82rem;
    color: var(--text-light);
    font-style: italic;
    line-height: 1.6;
  }

  .challenge-reflection strong {
    font-style: normal;
    color: var(--olive);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Section ── */
  .section {
    margin-bottom: 22px;
    animation: fadeSlideUp 0.5s ease both;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 7px;
    border-bottom: 1px solid rgba(107, 124, 90, 0.25);
  }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--olive);
    font-weight: 500;
  }

  .card {
    background: var(--warm-white);
    border-radius: 2px;
    padding: 18px 20px;
    border-left: 3px solid var(--olive);
    margin-bottom: 8px;
    font-size: 0.88rem;
    line-height: 1.65;
    color: var(--text-mid);
  }

  .card.urgent { border-left-color: var(--urgent); }
  .card.warning { border-left-color: var(--warning); }
  .card.ok { border-left-color: var(--ok); }
  .card strong { color: var(--text-dark); font-weight: 500; }

  .deadline-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--warm-white);
    margin-bottom: 6px;
    border-radius: 2px;
    font-size: 0.86rem;
  }

  .deadline-label { color: var(--text-mid); }

  .deadline-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.67rem;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    border-radius: 1px;
    font-weight: 500;
  }

  .badge-urgent { background: rgba(192,57,43,0.12); color: var(--urgent); }
  .badge-warning { background: rgba(212,137,10,0.12); color: var(--warning); }
  .badge-ok { background: rgba(90,124,90,0.12); color: var(--ok); }

  /* ── Finance Panel ── */
  .finance-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .finance-stat {
    background: var(--warm-white);
    border-radius: 2px;
    padding: 14px 16px;
    border-top: 3px solid var(--olive);
  }

  .finance-stat.red { border-top-color: var(--urgent); }
  .finance-stat.amber { border-top-color: var(--warning); }
  .finance-stat.green { border-top-color: var(--ok); }
  .finance-stat.gold { border-top-color: var(--mustard); }

  .finance-stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 4px;
  }

  .finance-stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--text-dark);
    line-height: 1;
  }

  .finance-stat-sub {
    font-size: 0.72rem;
    color: var(--text-light);
    margin-top: 3px;
  }

  .finance-bar-row {
    background: var(--warm-white);
    border-radius: 2px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }

  .finance-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--text-mid);
    margin-bottom: 6px;
  }

  .finance-bar-label span:last-child {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-light);
  }

  .finance-bar-track {
    height: 6px;
    background: rgba(107,124,90,0.15);
    border-radius: 3px;
    overflow: hidden;
  }

  .finance-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s ease;
  }

  .bar-green { background: var(--ok); }
  .bar-amber { background: var(--warning); }
  .bar-red { background: var(--urgent); }
  .bar-mustard { background: var(--mustard); }
  .bar-blue { background: #5A6FA8; }

  .debt-table {
    background: var(--warm-white);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .debt-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(107,124,90,0.1);
    font-size: 0.82rem;
    align-items: center;
  }

  .debt-row:last-child { border-bottom: none; }

  .debt-row.header {
    background: var(--olive-dark);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mustard);
  }

  .debt-name { color: var(--text-mid); font-weight: 500; }
  .debt-bal { color: var(--text-dark); font-family: 'DM Mono', monospace; font-size: 0.78rem; }
  .debt-rate { color: var(--urgent); font-family: 'DM Mono', monospace; font-size: 0.72rem; }
  .debt-months { color: var(--text-light); font-size: 0.72rem; text-align: right; }

  .finance-nudge {
    background: linear-gradient(135deg, rgba(74,90,58,0.08), rgba(200,168,75,0.08));
    border: 1px solid rgba(107,124,90,0.2);
    border-radius: 2px;
    padding: 16px 18px;
    margin-bottom: 8px;
  }

  .finance-nudge-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--olive);
    margin-bottom: 6px;
  }

  .finance-nudge-text {
    font-size: 0.88rem;
    line-height: 1.65;
    color: var(--text-mid);
  }

  .surplus-highlight {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--ok);
    font-weight: 600;
  }

  .surplus-highlight.negative { color: var(--urgent); }

  /* ── CYCLE PANEL ─────────────────────────────── */
  .cycle-phase-card {
    border-radius: 4px;
    padding: 18px 20px;
    margin-bottom: 14px;
    border-left: 3px solid var(--pink);
  }
  .cycle-phase-card.menstrual  { background: rgba(184,92,122,0.07); border-left-color: #B85C7A; }
  .cycle-phase-card.follicular { background: rgba(90,124,90,0.07);  border-left-color: #5A7C5A; }
  .cycle-phase-card.ovulatory  { background: rgba(200,168,75,0.07); border-left-color: #C8A84B; }
  .cycle-phase-card.luteal     { background: rgba(139,111,94,0.08); border-left-color: #8B6F5E; }
  .cycle-phase-card.warning    { background: rgba(184,92,122,0.13); border-left-color: #B85C7A; }

  .cycle-phase-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 6px;
  }
  .cycle-phase-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 400;
    color: var(--text-dark);
    margin-bottom: 8px;
  }
  .cycle-phase-body {
    font-size: 0.84rem;
    color: var(--text-mid);
    line-height: 1.65;
  }

  .cycle-countdown {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--warm-white);
    border-radius: 4px;
    margin-bottom: 14px;
  }
  .cycle-countdown-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 300;
    color: var(--pink);
    line-height: 1;
    min-width: 48px;
    text-align: center;
  }
  .cycle-countdown-label {
    font-size: 0.82rem;
    color: var(--text-mid);
    line-height: 1.5;
  }
  .cycle-countdown-label strong {
    display: block;
    font-size: 0.88rem;
    color: var(--text-dark);
    margin-bottom: 2px;
  }

  .cycle-day-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 14px;
  }
  .cycle-day-badge.menstrual  { background: rgba(184,92,122,0.12); color: #B85C7A; }
  .cycle-day-badge.follicular { background: rgba(90,124,90,0.12);  color: #5A7C5A; }
  .cycle-day-badge.ovulatory  { background: rgba(200,168,75,0.15); color: #9A7A20; }
  .cycle-day-badge.luteal     { background: rgba(139,111,94,0.12); color: #7A5040; }

  .symptom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .symptom-card {
    background: var(--warm-white);
    border-radius: 4px;
    padding: 12px 14px;
    border-top: 2px solid rgba(184,92,122,0.25);
  }
  .symptom-card-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 6px;
  }
  .symptom-card-body {
    font-size: 0.78rem;
    color: var(--text-mid);
    line-height: 1.55;
  }
  .symptom-card-body strong {
    color: var(--text-dark);
    display: block;
    margin-bottom: 3px;
    font-size: 0.8rem;
  }

  .cycle-warning-banner {
    background: rgba(184,92,122,0.1);
    border: 1px solid rgba(184,92,122,0.3);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 14px;
    font-size: 0.84rem;
    color: #8A3050;
    line-height: 1.6;
  }
  .cycle-warning-banner strong {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: #B85C7A;
  }

  .cycle-update-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 11px;
    background: transparent;
    border: 1.5px solid var(--pink);
    color: var(--pink);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .cycle-update-btn:hover { background: var(--pink); color: white; }

  .cycle-form {
    display: none;
    background: var(--warm-white);
    border-radius: 2px;
    padding: 18px;
    margin-top: 10px;
    border: 1px solid rgba(184,92,122,0.2);
  }
  .cycle-form.open { display: block; }
  .cycle-form-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 14px;
  }

  @media (max-width: 480px) {
    .symptom-grid { grid-template-columns: 1fr; }
  }

  /* ── DARK MODE OVERRIDES ──────────────────────────── */
  @media (prefers-color-scheme: dark) {
    :root {
      --cream: #1A1810;
      --warm-white: #221F18;
      --text-dark: #F0EBE0;
      --text-mid: #C8BCA8;
      --text-light: #9A8A76;
    }

    body { background: #1A1810; color: #F0EBE0; }

    /* Header keeps olive dark */
    header { background: #2A3520; }

    /* Cards and panels */
    .section { background: #221F18; border-color: rgba(255,255,255,0.06); }
    .deadline-card, .schedule-row, .task-category,
    .cycle-countdown, .symptom-card, .debt-row,
    .finance-stat, .finance-form { background: #2C2820; }

    /* Cycle phase cards — dark mode needs lighter text */
    .cycle-phase-card.luteal  { background: rgba(139,111,94,0.18); }
    .cycle-phase-card.menstrual  { background: rgba(184,92,122,0.15); }
    .cycle-phase-card.follicular { background: rgba(90,124,90,0.15); }
    .cycle-phase-card.ovulatory  { background: rgba(200,168,75,0.15); }

    .cycle-phase-title { color: #F0EBE0; }
    .cycle-phase-body  { color: #C8BCA8; }
    .cycle-phase-body strong { color: #F0EBE0; }

    /* Warning banner */
    .cycle-warning-banner { background: rgba(184,92,122,0.2); border-color: rgba(184,92,122,0.4); color: #F0A0BB; }
    .cycle-warning-banner strong { color: #F08099; }

    /* Symptom cards */
    .symptom-card { background: #2C2820; border-top-color: rgba(184,92,122,0.4); }
    .symptom-card-body { color: #C8BCA8; }
    .symptom-card-body strong { color: #F0EBE0; }

    /* Finance nudge */
    .finance-nudge { background: rgba(74,90,58,0.2); border-color: rgba(107,124,90,0.35); }
    .finance-nudge-text { color: #C8BCA8; }
    .finance-nudge-text strong { color: #F0EBE0; }

    /* Surplus allocation tiles */
    .surplus-tile-debt     { background: rgba(192,57,43,0.18) !important; }
    .surplus-tile-emerg    { background: rgba(200,168,75,0.18) !important; }
    .surplus-tile-buffer   { background: rgba(90,124,90,0.18) !important; }

    /* Debt table */
    .debt-row { border-bottom-color: rgba(255,255,255,0.06); }
    .debt-row.header { color: #9A8A76; }
    .debt-row span { color: #C8BCA8; }
    .debt-months { color: #9A8A76; }

    /* Progress bars track */
    .finance-bar-track { background: rgba(255,255,255,0.08); }

    /* Seed cycling block */
    .cycle-seed-block { background: rgba(184,92,122,0.12) !important; }

    /* Task list */
    .task-item { border-bottom-color: rgba(255,255,255,0.05); }
    .task-tag  { opacity: 0.85; }

    /* Generate button */
    .generate-btn { background: #9A7A20; }
    .generate-btn:hover { background: #B08A25; }

    /* Form inputs */
    .form-input { background: #1A1810; color: #F0EBE0; border-color: rgba(255,255,255,0.12); }
    .form-label { color: #9A8A76; }

    /* Divider */
    .divider { border-color: rgba(255,255,255,0.06); }

    /* Section headers */
    .section-header span { color: #C8BCA8; }
    .section-title { color: #F0EBE0; }

    /* Day badge */
    .day-badge { background: rgba(200,168,75,0.15); color: #C8A84B; }

    /* Clock */
    .clock { color: rgba(200,168,75,0.7); }

    /* Deadline cards */
    .deadline-urgent  { background: rgba(192,57,43,0.2);  border-color: rgba(192,57,43,0.4); }
    .deadline-warning { background: rgba(212,137,10,0.18); border-color: rgba(212,137,10,0.4); }
    .deadline-ok      { background: rgba(90,124,90,0.18); border-color: rgba(90,124,90,0.4); }
    .deadline-label, .deadline-date, .deadline-days { color: #C8BCA8; }
    .deadline-label strong { color: #F0EBE0; }

    /* Brief output */
    #briefOutput { color: #C8BCA8; }
  }
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: transparent;
    border: 1.5px solid var(--olive);
    color: var(--olive);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .finance-update-btn:hover { background: var(--olive); color: var(--cream); }

  .finance-form {
    display: none;
    background: var(--warm-white);
    border-radius: 2px;
    padding: 20px;
    margin-top: 10px;
    border: 1px solid rgba(107,124,90,0.2);
  }

  .finance-form.open { display: block; }

  .finance-form-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--olive);
    margin-bottom: 16px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-light);
    margin-bottom: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
  }

  .form-input {
    width: 100%;
    padding: 8px 12px;
    background: white;
    border: 1px solid rgba(107,124,90,0.25);
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.86rem;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--olive); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  var now = new Date();

  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

}

  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

  var now = getUKDate();

// ── RENDER CHALLENGE ──────────────────────────────────
function renderChallenge() {
  var now = getUKDate();
  var day = get90HardDay(now);
  var container = document.getElementById('challengeContainer');
  if (day < 1 || day > 92) {
    container.innerHTML = '<div class="challenge-card pillar-mot"><div class="challenge-body">Programme complete or not yet started.</div></div>';
    return;
  }
  var c = CHALLENGES[day];
  if (!c) { container.innerHTML = '<div class="challenge-card"><div class="challenge-body">Challenge data not available for Day ' + day + '.</div></div>'; return; }
  container.innerHTML = '<div class="challenge-card pillar-' + c.pillar + '">' +
    '<div class="challenge-pillar">' + PILLAR_LABELS[c.pillar] + '</div>' +
    '<div class="challenge-title">Day ' + day + ' · ' + c.title + '</div>' +
    '<div class="challenge-body">' + c.short + '</div>' +
    '<div class="challenge-reflection"><strong>Evening Reflection ↓</strong><br>' + c.reflection + '</div>' +
    '</div>';
}

  { label: 'Clinical Skills Video submission', date: new Date(2026,2,11) },
  { label: 'Summative SCC DPP sign-off',       date: new Date(2026,2,25) },
  { label: 'Clinic day',                        date: new Date(2026,2,14) },

  { label: 'Final PAD & Written Assignment',    date: new Date(2026,5,11) }
];

function renderDeadlines() {
  var now = getUKDate();
  var upcoming = [];
  for (var i = 0; i < deadlines.length; i++) {
    var d = daysUntil(deadlines[i].date);
    if (d >= 0) upcoming.push({ label: deadlines[i].label, days: d });
  }
  upcoming.sort(function(a,b){ return a.days - b.days; });
  upcoming = upcoming.slice(0, 5);
  var html = '';
  for (var j = 0; j < upcoming.length; j++) {
    var d = upcoming[j];

// ── TASK PERSISTENCE ──────────────────────────────────
function getTaskStorageKey() {
  var now = getUKDate();
  return 'dt_tasks_' + now.getFullYear() + '_' + (now.getMonth()+1) + '_' + now.getDate();
}

function loadTaskState() {
  try {
    var raw = localStorage.getItem(getTaskStorageKey());
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveTaskState(state) {
  try {
    localStorage.setItem(getTaskStorageKey(), JSON.stringify(state));
  } catch(e) {}
}

function toggleTask(catId, taskIndex) {
  var key = catId + '_' + taskIndex;
  var cb   = document.querySelector('#task-' + catId + '-' + taskIndex + ' .task-cb');
  var text = document.getElementById('task-text-' + catId + '-' + taskIndex);
  var state = loadTaskState();
  state[key] = !state[key];
  saveTaskState(state);
  if (cb)   { cb.classList.toggle('checked', state[key]); }
  if (text) { text.classList.toggle('done',   state[key]); }
}

function restoreTaskState() {
  var state = loadTaskState();
  for (var key in state) {
    if (state[key]) {
      var parts = key.split('_');
      // key format: catId_taskIndex — catId may itself contain underscores, so split from the right
      var taskIndex = parts[parts.length - 1];
      var catId = parts.slice(0, parts.length - 1).join('_');
      var cb   = document.querySelector('#task-' + catId + '-' + taskIndex + ' .task-cb');
      var text = document.getElementById('task-text-' + catId + '-' + taskIndex);
      if (cb)   cb.classList.add('checked');
      if (text) text.classList.add('done');
    }
  }
}

async function generateBrief() {
  var btn = document.getElementById('generateBtn');
  var output = document.getElementById('briefOutput');
  var loading = document.getElementById('loadingContainer');
  var content = document.getElementById('briefContent');

  btn.classList.add('loading'); btn.disabled = true;

  loading.style.display = 'block'; content.innerHTML = '';

  var now = getUKDate();
  var day90 = get90HardDay(now);
  var challenge = CHALLENGES[day90] || null;

  try {
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildSystem(day90, challenge, now),
        messages: [{ role: 'user', content: 'Today is ' + formatDate(now) + ', Day ' + day90 + ' of Debora\'s 90 Hard challenge. Please write her morning brief now.' }]
      })
    });
    var data = await resp.json();
    var text = '';
    if (data.content) { for (var i = 0; i < data.content.length; i++) { if (data.content[i].text) text += data.content[i].text; } }

  btn.classList.remove('loading'); btn.disabled = false;

// ── CYCLE DATA ────────────────────────────────────────
var CYCLE = {
  lastPeriodStart: new Date(2026, 1, 13), // 13 Feb 2026 (month is 0-indexed)
  cycleLength: 26,          // working estimate (25-28 range)
  periodDuration: 4,        // 4-5 days
  symptoms: ['fatigue', 'mood', 'heavyflow', 'sleep', 'brainfog', 'cravings']
};

function getCycleDay(now) {
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var start = new Date(CYCLE.lastPeriodStart.getFullYear(), CYCLE.lastPeriodStart.getMonth(), CYCLE.lastPeriodStart.getDate());
  // Find the most recent period start
  var cycleDay = Math.floor((today - start) / (1000*60*60*24));
  // Roll forward through cycles
  while (cycleDay >= CYCLE.cycleLength) {
    cycleDay -= CYCLE.cycleLength;
    start = new Date(start.getTime() + CYCLE.cycleLength * 24*60*60*1000);
    CYCLE.lastPeriodStart = start;
  }
  return cycleDay + 1; // 1-indexed
}

function getCyclePhase(cycleDay) {
  if (cycleDay <= CYCLE.periodDuration) return 'menstrual';
  if (cycleDay <= 13) return 'follicular';
  if (cycleDay <= 16) return 'ovulatory';
  return 'luteal';
}

function getNextPeriodDate() {
  var now = getUKDate();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var start = new Date(CYCLE.lastPeriodStart.getFullYear(), CYCLE.lastPeriodStart.getMonth(), CYCLE.lastPeriodStart.getDate());
  var cycleDay = Math.floor((today - start) / (1000*60*60*24)) + 1;
  var daysUntilNext = CYCLE.cycleLength - cycleDay + 1;
  var nextPeriod = new Date(today.getTime() + daysUntilNext * 24*60*60*1000);
  return { date: nextPeriod, daysUntil: daysUntilNext };
}

function renderCyclePanel() {
  var now = getUKDate();
  var cycleDay = getCycleDay(now);
  var phase = getCyclePhase(cycleDay);
  var phaseInfo = PHASE_INFO[phase];
  var nextPeriod = getNextPeriodDate();
  var daysUntil = nextPeriod.daysUntil;
  var isWarning = daysUntil <= 5;

  // Format next period date
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var npDate = nextPeriod.date;
  var npStr = npDate.getDate() + ' ' + months[npDate.getMonth()];
  var npEarly = new Date(npDate.getTime() - 24*60*60*1000);
  var npLate  = new Date(npDate.getTime() + 2*24*60*60*1000);
  var windowStr = npEarly.getDate() + '–' + npLate.getDate() + ' ' + months[npDate.getMonth()];

  var html = '';

  // Warning banner if within 5 days
  if (isWarning) {
    var warningText = daysUntil <= 0
      ? 'Your period may have started or is due today. If it has started, tap "Update Cycle Date" below to reset your tracker.'
      : 'Your period is expected in approximately ' + daysUntil + ' day' + (daysUntil !== 1 ? 's' : '') + ' (' + windowStr + '). You are in your pre-menstrual window. Your symptoms — fatigue, cravings, mood shifts, and brain fog — are physiological right now, not a sign that something is wrong with you.';
    html += '<div class="cycle-warning-banner"><strong>🩸 Pre-Period Window</strong>' + warningText + '</div>';
  }

  // Countdown + phase badge
  html += '<div class="cycle-countdown">' +
    '<div class="cycle-countdown-num">' + daysUntil + '</div>' +
    '<div class="cycle-countdown-label">' +
      '<strong>Days until next period</strong>' +
      'Expected ' + windowStr + ' · Cycle Day ' + cycleDay +
    '</div>' +
  '</div>';

  html += '<span class="cycle-day-badge ' + phase + '">' + phaseInfo.emoji + ' ' + phaseInfo.label + ' · Day ' + cycleDay + '</span>';

  // Phase card
  html += '<div class="cycle-phase-card ' + phase + '">' +

  var activeSymptoms = CYCLE.symptoms.filter(function(s) {

  if (activeSymptoms.length > 0) {

    '<div class="form-group" style="margin-bottom:12px">' +
      '<label class="form-label">First day of your last period</label>' +
      '<input class="form-input" type="date" id="cy_lastperiod" value="' + formatDateInput(CYCLE.lastPeriodStart) + '">' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group">' +
        '<label class="form-label">Cycle length (days)</label>' +
        '<input class="form-input" type="number" id="cy_length" value="' + CYCLE.cycleLength + '" min="21" max="40">' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Period duration (days)</label>' +
        '<input class="form-input" type="number" id="cy_duration" value="' + CYCLE.periodDuration + '" min="2" max="8">' +
      '</div>' +
    '</div>' +
    '<button class="form-save-btn" style="background:var(--pink)" onclick="saveCycleData()">Save & Recalculate</button>' +
    '<div class="form-saved-msg" id="cycleSavedMsg" style="color:var(--pink)">Cycle updated ✓</div>' +
  '</div>';

  document.getElementById('cyclePanelContainer').innerHTML = html;
}

function formatDateInput(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function toggleCycleForm() {
  var form = document.getElementById('cycleForm');
  if (form) form.classList.toggle('open');
}

function saveCycleData() {
  var dateVal = document.getElementById('cy_lastperiod').value;
  var length  = parseInt(document.getElementById('cy_length').value) || 26;
  var duration = parseInt(document.getElementById('cy_duration').value) || 4;
  if (dateVal) {
    var parts = dateVal.split('-');
    CYCLE.lastPeriodStart = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  }
  CYCLE.cycleLength   = length;
  CYCLE.periodDuration = duration;
  renderCyclePanel();
  var msg = document.getElementById('cycleSavedMsg');
  if (msg) { msg.style.display = 'block'; setTimeout(function(){ msg.style.display='none'; }, 2500); }
}


function init() {
  var now = getUKDate();
  var day90 = get90HardDay(now);
  document.getElementById('dateMain').textContent = formatDate(now);
  document.getElementById('dayBadge').textContent = 'Day ' + day90 + ' of 90 · #90HardWomensHealth';
  renderChallenge();
  renderDeadlines();
  renderSchedule();
  renderTaskList();
  renderCyclePanel();
  renderFinancePanel();
}

init();

</script>
</body>
</html>
